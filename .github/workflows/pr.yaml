name: Code Quality (PR)

on:
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run Linters
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61

      - name: Run Unit Tests
        run: go test -v -race -cover ./...
