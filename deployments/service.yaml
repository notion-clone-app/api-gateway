apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: default
  labels:
    app: api-gateway
    tier: gateway
spec:
  # Тип ClusterIP делает сервис доступным только внутри виртуальной сети Kubernetes кластера.
  # Для локальной разработки мы будем пробрасывать порты через 'make port-forward'.
  type: ClusterIP
  
  # Селектор связывает этот Service с подами вашего Deployment. 
  # Трафик пойдет на любые поды, у которых есть метка app: api-gateway.
  selector:
    app: api-gateway
    
  ports:
  - name: http
    protocol: TCP
    port: 80         # Внешний порт самого сервиса внутри сети K8s (к нему будут обращаться другие поды)
    targetPort: 8080 # Внутренний порт контейнера Go в вашем приложении (HTTP_PORT из деплоймента)
